<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Путешествие вашей мечты</title>
    <link rel="stylesheet" href="entrance.css">
   
    <link rel="stylesheet" href="app.css">
</head>
<body>


    <div class="page-loader">
        <div class="loader-spinner"></div>
    </div>

    <div class="auth-container">

        <div class="user-icon">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
        <span class="username-label">Имя пользователя</span>

        <div class="tabs">
            <button class="tab active" id="loginTab" onclick="switchTab('login')">ВХОД</button>
            <button class="tab" id="registerTab" onclick="switchTab('register')">РЕГИСТРАЦИЯ</button>
        </div>


        <div class="form-card" id="loginForm">
            <p class="form-card-text"><strong>Войдите</strong> в аккаунт, чтобы продолжить</p>

            <div class="input-group">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                <input type="email" class="form-input" id="loginEmail" placeholder="Электронная почта" required>
            </div>

            <div class="input-group">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" class="form-input" id="loginPassword" placeholder="Пароль" required>
            </div>

            <button class="submit-btn" onclick="handleLogin(event)">Войти</button>

            <div class="success-message" id="loginSuccess">
                <svg class="success-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                <h3>Добро пожаловать!</h3>
                <p>Вы успешно вошли в аккаунт.</p>
            </div>
        </div>

        <div class="form-card hidden" id="registerForm">
            <p class="form-card-text"><strong>Зарегистрируйтесь</strong>, чтобы создать аккаунт</p>

            <div class="input-group">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                <input type="text" class="form-input" id="regName" placeholder="Имя пользователя" required>
            </div>

            <div class="input-group">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                <input type="email" class="form-input" id="regEmail" placeholder="Электронная почта" required>
            </div>

            <div class="input-group">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" class="form-input" id="regPassword" placeholder="Пароль" required>
            </div>

            <div class="input-group">
                <svg class="input-icon" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
                <input type="password" class="form-input" id="regPasswordConfirm" placeholder="Подтвердите пароль" required>
            </div>

            <button class="submit-btn" onclick="handleRegister(event)">Зарегистрироваться</button>

            <div class="success-message" id="registerSuccess">
                <svg class="success-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                <h3>Регистрация завершена!</h3>
                <p>Аккаунт успешно создан. Теперь вы можете войти.</p>
            </div>
        </div>
    </div>

<script>
function switchTab(tab) {
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');

    if (tab === 'login') {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
    } else {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.classList.remove('hidden');
        loginForm.classList.add('hidden');
    }
}

function showSuccess(formId) {
    const successDiv = document.getElementById(formId === 'login' ? 'loginSuccess' : 'registerSuccess');
    successDiv.classList.add('active');
    setTimeout(() => { window.location.href = '/profile.html'; }, 2000);
}

async function handleLogin(event) {
    event.preventDefault();
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await response.json();

        if (data.success) {
            localStorage.setItem('token', data.token);
            if (data.user) {
                localStorage.setItem('username', data.user.username || '');
                localStorage.setItem('email', data.user.email || '');
            }
            showSuccess('login');
        } else {
            alert(data.error);
        }
    } catch (error) {
        alert('Ошибка соединения');
    }
}

async function handleRegister(event) {
    event.preventDefault();
    const username = document.getElementById('regName').value;
    const email = document.getElementById('regEmail').value;
    const password = document.getElementById('regPassword').value;
    const passwordConfirm = document.getElementById('regPasswordConfirm').value;

    if (password !== passwordConfirm) {
        alert('Пароли не совпадают!');
        return;
    }

    try {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await response.json();

        if (data.success) {
            if (data.token) {
                localStorage.setItem('token', data.token);
                if (data.user) {
                    localStorage.setItem('username', data.user.username || '');
                    localStorage.setItem('email', data.user.email || '');
                }
            }
            showSuccess('register');
        } else {
            alert(data.error);
        }
    } catch (error) {
        alert('Ошибка соединения');
    }
}

document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        const loginForm = document.getElementById('loginForm');
        if (!loginForm.classList.contains('hidden')) {
            handleLogin(e);
        } else {
            handleRegister(e);
        }
    }
});
</script>

<script src="app.js"></script>
</body>
</html>
